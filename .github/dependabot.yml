# To enable dependabot updates for every package, we need to enumerate them here
version: 2
updates:
  # Docker updates for all Dockerfiles in deploy/docker
  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    target-branch: "main"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Go updates for Gateway
  - package-ecosystem: "gomod"
    directory: "/src/gateway"
    target-branch: "main"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # Go updates for Node
  - package-ecosystem: "gomod"
    directory: "/src/node"
    target-branch: "main"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # Go updates for MCP
  - package-ecosystem: "gomod"
    directory: "/src/mcp"
    target-branch: "main"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # Go updates for Shared Pkgs
  - package-ecosystem: "gomod"
    directory: "/src/pkg"
    target-branch: "main"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
