# To enable dependabot updates for every package, we need to enumerate them here
version: 2
updates:
  # Docker updates — Dockerfiles live alongside their source
  - package-ecosystem: "docker"
    directory: "/src/gateway"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/src/node"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/src/mcp"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/src/extractous-sidecar"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Go updates for Gateway
  - package-ecosystem: "gomod"
    directory: "/src/gateway"
    target-branch: "develop"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # Go updates for Node
  - package-ecosystem: "gomod"
    directory: "/src/node"
    target-branch: "develop"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # Go updates for Shared Pkgs
  - package-ecosystem: "gomod"
    directory: "/src/pkg"
    target-branch: "develop"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
