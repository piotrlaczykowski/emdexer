name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.0

    - name: Build Emdexer Gateway
      run: cd gateway && go mod tidy && go build -v ./...

    - name: Build Emdexer Node
      run: cd node && go mod tidy && go build -v ./...

    - name: Build Emdexer CLI
      run: cd cmd/emdex && go mod tidy && go build -v ./...

    - name: Run Gateway Tests
      run: cd gateway && go test -v ./...
      continue-on-error: true # Allow non-critical test failures

    - name: Run Node Tests
      run: cd node && go test -v ./...
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.0

    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.59.1

    - name: Run golangci-lint on Gateway
      run: cd gateway && $(go env GOPATH)/bin/golangci-lint run ./...

    - name: Run golangci-lint on Node
      run: cd node && $(go env GOPATH)/bin/golangci-lint run ./...

    - name: Run golangci-lint on CLI
      run: cd cmd/emdex && $(go env GOPATH)/bin/golangci-lint run ./...
