name: Docker Build Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      chart_path:
        required: false
        type: string
        default: ""
      build_context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for git describe --tags

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm)
        if: inputs.chart_path != '' && github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Calculate tag
        id: tag
        run: |
          EVENT_NAME="${{ github.event_name }}"
          BRANCH_NAME="${{ github.ref_name }}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Get last released version from git tags (strip 'v' prefix)
          # Falls back to 0.0.0 if no tags exist yet
          # Note: pipe to sed swallows git describe exit code, so assign first then strip.
          _RAW_TAG=$(git describe --tags --abbrev=0 2>/dev/null) && BASE_VERSION="${_RAW_TAG#v}" || BASE_VERSION="0.0.0"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            VERSION_TAG="${BASE_VERSION}-pr-${SHORT_SHA}"
            ROLLING_TAG=""
          elif [[ "${BRANCH_NAME}" == "main" ]]; then
            # Continuous main builds — versioned release images are handled by release-docker job
            VERSION_TAG="${SHORT_SHA}"
            ROLLING_TAG="edge"
          else
            # feature/* and other branches → alpha (no rolling tag — branches diverge)
            VERSION_TAG="${BASE_VERSION}-alpha-${SHORT_SHA}"
            ROLLING_TAG=""
          fi

          REGISTRY="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}"

          # Build newline-delimited tags string for docker/build-push-action
          TAGS="${REGISTRY}:${VERSION_TAG}"
          [[ -n "${ROLLING_TAG}" ]] && TAGS="${TAGS}"$'\n'"${REGISTRY}:${ROLLING_TAG}"

          # Write multiline output via heredoc delimiter
          {
            echo "tags<<TAGS_EOF"
            echo "${TAGS}"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

          echo "--- Image Tags ---"
          echo "Versioned : ${REGISTRY}:${VERSION_TAG}"
          [[ -n "${ROLLING_TAG}" ]] && echo "Rolling   : ${REGISTRY}:${ROLLING_TAG}" || echo "Rolling   : (none)"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('deploy/docker/Dockerfile.{0}', inputs.service_name) }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tag.outputs.tags }}

      - name: Set up Helm
        if: inputs.chart_path != ''
        uses: azure/setup-helm@v5

      - name: Lint Helm Chart
        if: inputs.chart_path != ''
        run: |
          helm lint ${{ inputs.chart_path }}

      - name: Package Helm Chart
        if: inputs.chart_path != '' && github.event_name != 'pull_request'
        run: |
          mkdir -p dist/charts
          VERSION_TAG="${{ steps.tag.outputs.version_tag }}"
          helm package ${{ inputs.chart_path }} --version "${VERSION_TAG}" --app-version "${VERSION_TAG}" -d dist/charts

      - name: Push Helm Chart to GHCR
        if: inputs.chart_path != '' && github.event_name != 'pull_request'
        run: |
          helm push dist/charts/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
