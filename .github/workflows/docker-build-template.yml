name: Docker Build Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate tag
        id: tag
        run: |
          EVENT_NAME="${{ github.event_name }}"
          BRANCH_NAME="${{ github.ref_name }}"
          
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            SUFFIX="-PR"
            PUSH="false"
          elif [[ "${BRANCH_NAME}" == "main" ]]; then
            SUFFIX=""
            PUSH="true"
          elif [[ "${BRANCH_NAME}" == "develop" ]]; then
            SUFFIX="-beta"
            PUSH="true"
          elif [[ "${BRANCH_NAME}" =~ ^release/ ]]; then
            SUFFIX="-rc"
            PUSH="true"
          elif [[ "${BRANCH_NAME}" =~ ^hotfix/ ]]; then
            SUFFIX="-hotfix"
            PUSH="true"
          else
            SUFFIX="-alpha"
            PUSH="true"
          fi
          
          # Version could be short SHA or tag if present
          VERSION=$(git rev-parse --short HEAD)
          echo "tag=ghcr.io/piotrlaczykowski/emdexer-${{ inputs.service_name }}:${VERSION}${SUFFIX}" >> $GITHUB_OUTPUT
          echo "latest_tag=ghcr.io/piotrlaczykowski/emdexer-${{ inputs.service_name }}:latest${SUFFIX}" >> $GITHUB_OUTPUT
          echo "push=${PUSH}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ inputs.service_name }}
          push: ${{ steps.tag.outputs.push }}
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.latest_tag }}
