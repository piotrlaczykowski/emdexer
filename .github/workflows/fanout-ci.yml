name: Fan-out CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'feature/*'
      - 'bugfix/*'
  pull_request:
    branches:
      - main
      - develop
      - 'release/*'
      - 'feature/*'
      - 'bugfix/*'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      node: ${{ steps.filter.outputs.node }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'src/gateway/**'
              - 'deploy/docker/Dockerfile.gateway'
            node:
              - 'src/node/**'
              - 'deploy/docker/Dockerfile.node'
            mcp:
              - 'src/mcp/**'
              - 'deploy/docker/Dockerfile.mcp'

  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: gateway
      image_name: emdexer-gateway

  build-node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: node
      image_name: emdexer-node

  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: mcp
      image_name: emdexer-mcp
