name: Fan-out CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  # ================================================================
  # DETECT CHANGES - Identify which services have been modified
  # ================================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      node: ${{ steps.filter.outputs.node }}
      mcp: ${{ steps.filter.outputs.mcp }}
      plugin_sidecar: ${{ steps.filter.outputs.plugin_sidecar }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'src/gateway/**'
              - 'src/pkg/**'
              - 'deploy/docker/Dockerfile.gateway'
            node:
              - 'src/node/**'
              - 'src/pkg/**'
              - 'deploy/docker/Dockerfile.node'
            mcp:
              - 'src/mcp/**'
              - 'deploy/docker/Dockerfile.mcp'
            plugin_sidecar:
              - 'src/plugin-sidecar/**'

      - name: Debug - Show detected changes
        run: |
          echo "--- Changed services ---"
          echo "gateway        : ${{ steps.filter.outputs.gateway }}"
          echo "node           : ${{ steps.filter.outputs.node }}"
          echo "mcp            : ${{ steps.filter.outputs.mcp }}"
          echo "plugin_sidecar : ${{ steps.filter.outputs.plugin_sidecar }}"

  # ================================================================
  # BUILD SERVICES - Per-service Docker builds with versioned tags
  # alpha (feature/*) — versioned release images handled by release-docker job on main
  # Skipped on main push — release-docker handles versioned images
  # ================================================================
  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' && github.ref != 'refs/heads/main'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: gateway
      image_name: emdexer-gateway
      chart_path: deploy/helm/emdexer-gateway

  build-node:
    needs: changes
    if: needs.changes.outputs.node == 'true' && github.ref != 'refs/heads/main'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: node
      image_name: emdexer-node
      chart_path: deploy/helm/emdexer-node

  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true' && github.ref != 'refs/heads/main'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: mcp
      image_name: emdexer-mcp

  build-plugin-sidecar:
    needs: changes
    if: needs.changes.outputs.plugin_sidecar == 'true' && github.ref != 'refs/heads/main'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: plugin-sidecar
      image_name: emdexer-plugin-sidecar
      build_context: src/plugin-sidecar
      dockerfile: src/plugin-sidecar/Dockerfile

  # ================================================================
  # RELEASE - Managed by release-please on main
  # Reads conventional commits to determine semver bump:
  #   fix:     → patch  (1.0.0 → 1.0.1)
  #   feat:    → minor  (1.0.0 → 1.1.0)
  #   feat!:   → major  (1.0.0 → 2.0.0)
  # ================================================================
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: go
          target-branch: main

  # ================================================================
  # RELEASE DOCKER - Build versioned Docker images on release
  # Tagged: {version} (e.g. 1.0.0) + latest
  # ================================================================
  release-docker:
    needs: release-please
    if: github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            image_name: emdexer-gateway
            dockerfile: deploy/docker/Dockerfile.gateway
            build_context: .
          - service: node
            image_name: emdexer-node
            dockerfile: deploy/docker/Dockerfile.node
            build_context: .
          - service: mcp
            image_name: emdexer-mcp
            dockerfile: deploy/docker/Dockerfile.mcp
            build_context: .
          - service: plugin-sidecar
            image_name: emdexer-plugin-sidecar
            dockerfile: src/plugin-sidecar/Dockerfile
            build_context: src/plugin-sidecar
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          TAG_NAME="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Released version: ${VERSION}"

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest

  # ================================================================
  # RELEASE BINARIES - Cross-compiled Go binaries attached to GitHub Release
  # ================================================================
  release-binaries:
    needs: release-please
    if: github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Build
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          COMMIT=$(git rev-parse --short HEAD)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make all VERSION=$VERSION COMMIT=$COMMIT LICENSE_TYPE=Community

          mkdir -p dist
          mv bin/emdex dist/emdex-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-gateway dist/emdex-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-node dist/emdex-node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================================================================
  # RELEASE HELM - Package and push Helm charts to GHCR as OCI artifacts
  # Install: helm install oci://ghcr.io/{owner}/charts/emdexer-gateway --version 1.0.0
  # ================================================================
  release-helm:
    needs: [release-please, release-binaries]
    if: github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package and push Charts
        run: |
          mkdir -p dist/charts
          VERSION=${{ needs.release-please.outputs.tag_name }}
          CHART_VERSION=${VERSION#v}

          helm package deploy/helm/emdexer-gateway --version $CHART_VERSION --app-version $VERSION -d dist/charts
          helm package deploy/helm/emdexer-node --version $CHART_VERSION --app-version $VERSION -d dist/charts

          helm push dist/charts/emdexer-gateway-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push dist/charts/emdexer-node-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
