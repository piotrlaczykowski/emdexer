name: Fan-out CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - develop
      - 'release/*'
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      node: ${{ steps.filter.outputs.node }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'src/gateway/**'
              - 'src/pkg/**'
              - 'deploy/docker/Dockerfile.gateway'
            node:
              - 'src/node/**'
              - 'src/pkg/**'
              - 'deploy/docker/Dockerfile.node'
            mcp:
              - 'src/mcp/**'
              - 'deploy/docker/Dockerfile.mcp'

  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: gateway
      image_name: emdexer-gateway
      chart_path: deploy/helm/emdexer-gateway

  build-node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: node
      image_name: emdexer-node
      chart_path: deploy/helm/emdexer-node

  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    uses: ./.github/workflows/docker-build-template.yml
    with:
      service_name: mcp
      image_name: emdexer-mcp

  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: go
          target-branch: main

  release-binaries:
    needs: release-please
    if: github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Build
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          COMMIT=$(git rev-parse --short HEAD)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make all VERSION=$VERSION COMMIT=$COMMIT LICENSE_TYPE=Community
          
          mkdir -p dist
          mv bin/emdex dist/emdex-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-gateway dist/emdex-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-node dist/emdex-node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-helm:
    needs: [release-please, release-binaries]
    if: github.ref == 'refs/heads/main' && needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Charts
        run: |
          mkdir -p dist/charts
          VERSION=${{ needs.release-please.outputs.tag_name }}
          # Strip 'v' prefix for Helm if present
          CHART_VERSION=${VERSION#v}
          
          helm package deploy/helm/emdexer-gateway --version $CHART_VERSION --app-version $VERSION -d dist/charts
          helm package deploy/helm/emdexer-node --version $CHART_VERSION --app-version $VERSION -d dist/charts

      - name: Upload Charts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/charts/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
