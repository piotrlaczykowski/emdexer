name: GitFlow Guardian

on:
  pull_request:
    branches:
      - master
      - main
      - develop

permissions:
  contents: read

jobs:
  enforce-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Policy
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          SOURCE_BRANCH="${{ github.head_ref }}"

          echo "Target branch: $TARGET_BRANCH"
          echo "Source branch: $SOURCE_BRANCH"

          if [[ "$TARGET_BRANCH" == "master" || "$TARGET_BRANCH" == "main" ]]; then
            if [[ ! "$SOURCE_BRANCH" =~ ^(release/|hotfix/|release-please--) ]]; then
              echo "⛔ ILLEGAL MERGE: Master only accepts merges from release/*, hotfix/*, or release-please branches."
              exit 1
            fi
          fi

          if [[ "$TARGET_BRANCH" == "develop" ]]; then
            if [[ "$SOURCE_BRANCH" == "master" || "$SOURCE_BRANCH" == "main" ]]; then
              echo "⛔ ILLEGAL MERGE: Cannot merge master/main into develop."
              exit 1
            fi

            # Recommendation (non-blocking but logged)
            if [[ ! "$SOURCE_BRANCH" =~ ^(feature/|bugfix/|refactor/) ]]; then
              echo "⚠️ WARNING: Source branch should ideally be feature/*, bugfix/*, or refactor/*."
            fi
          fi

          echo "✅ Policy check passed."
