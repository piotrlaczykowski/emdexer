on:
  push:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: go
          target-branch: ${{ github.ref_name }}

  release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: Build
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          COMMIT=$(git rev-parse --short HEAD)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make all VERSION=$VERSION COMMIT=$COMMIT LICENSE_TYPE=Community
          
          mkdir -p dist
          mv bin/emdex dist/emdex-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-gateway dist/emdex-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-node dist/emdex-node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-release:
    needs: [release-please, release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Charts
        run: |
          mkdir -p dist/charts
          VERSION=${{ needs.release-please.outputs.tag_name }}
          # Strip 'v' prefix for Helm if present
          CHART_VERSION=${VERSION#v}
          
          helm package deploy/helm/emdexer-gateway --version $CHART_VERSION --app-version $VERSION -d dist/charts
          helm package deploy/helm/emdexer-node --version $CHART_VERSION --app-version $VERSION -d dist/charts

      - name: Upload Charts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/charts/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
