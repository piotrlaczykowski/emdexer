name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'   # v1.2.0, v0.9.1-rc.1, etc.
      - '[0-9]*.[0-9]*.[0-9]*'     # 1.2.0, 0.9.1, etc.

permissions:
  contents: write
  packages: write

jobs:
  # ================================================================
  # DOCKER - Build and push versioned images to GHCR
  # Tagged: {version} (e.g. 1.2.0) + latest
  # ================================================================
  docker:
    name: Docker Images → GHCR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            image_name: emdexer-gateway
            dockerfile: deploy/docker/Dockerfile.gateway
            build_context: .
          - service: node
            image_name: emdexer-node
            dockerfile: deploy/docker/Dockerfile.node
            build_context: .
          - service: mcp
            image_name: emdexer-mcp
            dockerfile: deploy/docker/Dockerfile.mcp
            build_context: .
          - service: plugin-sidecar
            image_name: emdexer-plugin-sidecar
            dockerfile: src/plugin-sidecar/Dockerfile
            build_context: src/plugin-sidecar
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest

  # ================================================================
  # BINARIES - Cross-compiled Go binaries attached to GitHub Release
  # ================================================================
  binaries:
    name: Go Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT=$(git rev-parse --short HEAD)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make all VERSION=$VERSION COMMIT=$COMMIT LICENSE_TYPE=Community

          mkdir -p dist
          mv bin/emdex dist/emdex-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-gateway dist/emdex-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          mv bin/emdex-node dist/emdex-node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # ================================================================
  # HELM - Package and push charts to GHCR as OCI artifacts
  # Install: helm install oci://ghcr.io/{owner}/charts/emdexer-gateway --version 1.2.0
  # ================================================================
  helm:
    name: Helm Charts → GHCR
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package and push charts
        run: |
          mkdir -p dist/charts
          VERSION="${{ steps.version.outputs.version }}"

          helm package deploy/helm/emdexer-gateway --version $VERSION --app-version $VERSION -d dist/charts
          helm package deploy/helm/emdexer-node --version $VERSION --app-version $VERSION -d dist/charts

          helm push dist/charts/emdexer-gateway-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push dist/charts/emdexer-node-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
