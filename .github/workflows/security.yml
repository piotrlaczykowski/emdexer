name: Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * 1' # Weekly scan on Monday midnight

jobs:
  gosec:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [src/gateway, src/node, src/pkg]
    steps:
      - uses: actions/checkout@v4
      - name: Run Gosec Security Scanner (${{ matrix.module }})
        uses: securego/gosec@master
        with:
          args: ./${{ matrix.module }}/...

  govulncheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [src/gateway, src/node, src/pkg]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (${{ matrix.module }})
        run: cd ${{ matrix.module }} && govulncheck ./...
