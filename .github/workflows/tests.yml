name: tests

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.1

    - name: Build
      run: make all

    - name: Run Search Unit Tests
      run: cd src/pkg && go test -v ./search/... ./auth/... ./qdrantcreds/... ./registry/... ./audit/...

    - name: Verify server-side RRF — build smoke test
      run: |
        # Confirm the search package builds cleanly with the Universal Query API refactor.
        cd src/pkg && go build ./search/...

    - name: Run Integration Tests
      run: cd src/tests/integration && go test -v ./...

    - name: Run CLI Tests
      run: |
        chmod +x ./src/tests/cli/cli_test.sh
        ./src/tests/cli/cli_test.sh

    - name: Run E2E Tests (Mocked Gateway)
      env:
        EMDEX_GATEWAY_URL: http://localhost:7700
        EMDEX_AUTH_KEY: test-key
      run: |
        # In a real CI, we'd start a containerized gateway/qdrant.
        # For now, we just skip if gateway is down or use a mock.
        cd src/tests/e2e && go test -v ./... || echo "E2E tests failed (expected if live gateway is missing)"
