name: tests

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.1

    - name: Build
      run: make all

    - name: Run Search Unit Tests
      run: cd src/pkg && go test -v ./search/... ./auth/... ./qdrantcreds/... ./registry/... ./audit/...

    - name: Verify server-side RRF — build smoke test
      run: |
        # Confirm the search package builds cleanly with the Universal Query API refactor.
        cd src/pkg && go build ./search/...

    - name: Run Integration Tests
      run: cd src/tests/integration && go test -v ./...

    - name: Run CLI Tests
      run: |
        chmod +x ./src/tests/cli/cli_test.sh
        ./src/tests/cli/cli_test.sh

    - name: Run E2E Tests (Mocked Gateway)
      run: |
        # EMDEX_GATEWAY_URL is intentionally unset so tests use the built-in
        # httptest mock. Setting it to a non-running host causes t.Fatalf on
        # connection refused before the mock fallback is reached.
        cd src/tests/e2e && go test -v ./...
