name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: Build
      run: make all

    - name: Run Integration Tests
      run: |
        go test -v ./tests/integration/...

    - name: Run CLI Tests
      run: |
        chmod +x ./tests/cli/cli_test.sh
        ./tests/cli/cli_test.sh

    - name: Run E2E Tests (Mocked Gateway)
      env:
        EMDEX_GATEWAY_URL: http://localhost:7700
        EMDEX_AUTH_KEY: test-key
      run: |
        # In a real CI, we'd start a containerized gateway/qdrant.
        # For now, we just skip if gateway is down or use a mock.
        go test -v ./tests/e2e/... || echo "E2E tests failed (expected if live gateway is missing)"
