# High-Availability deployment (Phase 15.1 / 15.2)
#
# 3-node Qdrant Raft cluster, 2 gateway replicas behind Nginx,
# PostgreSQL for shared node registry, multi-node workers.
#
# Usage:
#   docker compose -f docker-compose.ha.yml up -d

services:
  # ============================================================
  # Qdrant 3-node Raft cluster
  # ============================================================

  qdrant-1:
    image: qdrant/qdrant:v1.13.0
    environment:
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - qdrant-storage-1:/qdrant/storage
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      # Two-stage: HTTP liveness + Raft cluster readiness check.
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz && curl -sf http://localhost:6333/cluster | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant-2:
    image: qdrant/qdrant:v1.13.0
    environment:
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__BOOTSTRAP=http://qdrant-1:6335
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - qdrant-storage-2:/qdrant/storage
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz && curl -sf http://localhost:6333/cluster | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant-3:
    image: qdrant/qdrant:v1.13.0
    environment:
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__BOOTSTRAP=http://qdrant-1:6335
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - qdrant-storage-3:/qdrant/storage
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz && curl -sf http://localhost:6333/cluster | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # PostgreSQL — shared node registry
  # ============================================================

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=emdexer
      - POSTGRES_USER=emdexer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-emdexer_secret}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emdexer"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Extractous sidecar
  # ============================================================

  plugin-sidecar:
    build: ../../src/plugin-sidecar
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ../../plugins:/plugins:ro
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  extractous:
    build: ./extractous-sidecar
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Whisper sidecar (audio/video transcription)
  # ============================================================

  whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main
    command: ["/app/build/bin/whisper-server", "-m", "/models/ggml-${EMDEX_WHISPER_MODEL:-base}.bin", "--host", "0.0.0.0", "--port", "8080"]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    volumes:
      - whisper-models:/models
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================
  # Gateway replicas (internal — Nginx exposes 7700 to host)
  # ============================================================

  gateway-1:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - EMDEX_PORT=8080
      - QDRANT_HOST=qdrant-1:6334
      - QDRANT_HTTP_HOST=qdrant-1:6333
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - POSTGRES_URL=postgres://emdexer:${POSTGRES_PASSWORD:-emdexer_secret}@postgres:5432/emdexer?sslmode=disable
      - EMDEX_HA_MODE=true
      - EMDEX_GLOBAL_SEARCH_TIMEOUT=${EMDEX_GLOBAL_SEARCH_TIMEOUT:-500}
      - EMDEX_API_KEYS=${EMDEX_API_KEYS:-}
      - EMDEX_BM25_ENABLED=${EMDEX_BM25_ENABLED:-true}
      - EMDEX_RRF_K=${EMDEX_RRF_K:-60}
      - EMDEX_RRF_VECTOR_WEIGHT=${EMDEX_RRF_VECTOR_WEIGHT:-1.0}
      - EMDEX_RRF_BM25_WEIGHT=${EMDEX_RRF_BM25_WEIGHT:-1.0}
      - EMDEX_AUDIT_BUFFER_SIZE=${EMDEX_AUDIT_BUFFER_SIZE:-1000}
      - EMDEX_AGENTIC_ENABLED=${EMDEX_AGENTIC_ENABLED:-true}
      - EMDEX_MAX_HOPS=${EMDEX_MAX_HOPS:-3}
      - EMDEX_HOP_CONFIDENCE_THRESHOLD=${EMDEX_HOP_CONFIDENCE_THRESHOLD:-0.7}
      - EMDEX_GRAPH_ENABLED=${EMDEX_GRAPH_ENABLED:-true}
      - EMDEX_GRAPH_DEPTH=${EMDEX_GRAPH_DEPTH:-1}
      # Uncomment to enable distributed tracing (OTLP/gRPC, backend-agnostic).
      # - EMDEX_OTEL_ENDPOINT=otel-collector:4317
      # - EMDEX_OTEL_SAMPLING_RATIO=1.0
      # ── Qdrant mTLS (Phase 28) ────────────────────────────────
      # - EMDEX_QDRANT_TLS=true
      # - EMDEX_QDRANT_TLS_CA=/certs/ca.pem
      # - EMDEX_QDRANT_TLS_CERT=/certs/client.pem
      # - EMDEX_QDRANT_TLS_KEY=/certs/client.key
      # ── PostgreSQL read replica (Phase 28) ───────────────────
      # - EMDEX_PG_REPLICA_URL=postgres://user:pass@replica:5432/emdexer?sslmode=require
    volumes:
      - ../../logs:/app/logs
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-2:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - EMDEX_PORT=8080
      - QDRANT_HOST=qdrant-1:6334
      - QDRANT_HTTP_HOST=qdrant-1:6333
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - POSTGRES_URL=postgres://emdexer:${POSTGRES_PASSWORD:-emdexer_secret}@postgres:5432/emdexer?sslmode=disable
      - EMDEX_HA_MODE=true
      - EMDEX_GLOBAL_SEARCH_TIMEOUT=${EMDEX_GLOBAL_SEARCH_TIMEOUT:-500}
      - EMDEX_API_KEYS=${EMDEX_API_KEYS:-}
      - EMDEX_BM25_ENABLED=${EMDEX_BM25_ENABLED:-true}
      - EMDEX_RRF_K=${EMDEX_RRF_K:-60}
      - EMDEX_RRF_VECTOR_WEIGHT=${EMDEX_RRF_VECTOR_WEIGHT:-1.0}
      - EMDEX_RRF_BM25_WEIGHT=${EMDEX_RRF_BM25_WEIGHT:-1.0}
      - EMDEX_AUDIT_BUFFER_SIZE=${EMDEX_AUDIT_BUFFER_SIZE:-1000}
      - EMDEX_AGENTIC_ENABLED=${EMDEX_AGENTIC_ENABLED:-true}
      - EMDEX_MAX_HOPS=${EMDEX_MAX_HOPS:-3}
      - EMDEX_HOP_CONFIDENCE_THRESHOLD=${EMDEX_HOP_CONFIDENCE_THRESHOLD:-0.7}
      - EMDEX_GRAPH_ENABLED=${EMDEX_GRAPH_ENABLED:-true}
      - EMDEX_GRAPH_DEPTH=${EMDEX_GRAPH_DEPTH:-1}
      # Uncomment to enable distributed tracing (OTLP/gRPC, backend-agnostic).
      # - EMDEX_OTEL_ENDPOINT=otel-collector:4317
      # - EMDEX_OTEL_SAMPLING_RATIO=1.0
      # ── Qdrant mTLS (Phase 28) ────────────────────────────────
      # - EMDEX_QDRANT_TLS=true
      # - EMDEX_QDRANT_TLS_CA=/certs/ca.pem
      # - EMDEX_QDRANT_TLS_CERT=/certs/client.pem
      # - EMDEX_QDRANT_TLS_KEY=/certs/client.key
      # ── PostgreSQL read replica (Phase 28) ───────────────────
      # - EMDEX_PG_REPLICA_URL=postgres://user:pass@replica:5432/emdexer?sslmode=require
    volumes:
      - ../../logs:/app/logs
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Nginx load balancer
  # ============================================================

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "7700:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - emdexer-net
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/nginx_status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # Worker nodes (multiple types)
  # ============================================================

  node-local:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "8081:8081"
    volumes:
      - ../../test_dir:/app/test_dir
    environment:
      - QDRANT_HOST=qdrant-1:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=default
      - NODE_HEALTH_PORT=8081
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      # ── Audio/Video transcription (Track 1) ──────────────────
      # - EMDEX_WHISPER_ENABLED=true
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      # - EMDEX_WHISPER_MIN_CHARS=50
      # - EMDEX_WHISPER_LANGUAGE=
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      # ── Gemini Vision image captioning (Track 2) ─────────────
      # - EMDEX_VISION_ENABLED=true
      # - EMDEX_VISION_MAX_SIZE_MB=10
      # ── FFmpeg video frame extraction (Track 3) ──────────────
      # - EMDEX_FRAME_ENABLED=true
      # - EMDEX_FFMPEG_URL=http://ffmpeg-sidecar:8004
      # - EMDEX_FRAME_INTERVAL_SEC=30
      # - EMDEX_MAX_FRAMES=10
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMDEX_GRAPH_MIGRATION=${EMDEX_GRAPH_MIGRATION:-auto}
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
      - EMDEX_GATEWAY_URL=http://nginx:80
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
      extractous:
        condition: service_healthy
      whisper:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-smb:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant-1:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=${SMB_NAMESPACE:-smb}
      - NODE_TYPE=smb
      - SMB_HOST=${SMB_HOST}
      - SMB_SHARE=${SMB_SHARE}
      - SMB_USER=${SMB_USER}
      - SMB_PASS=${SMB_PASS}
      - NODE_HEALTH_PORT=8082
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      # ── Audio/Video transcription (Track 1) ──────────────────
      # - EMDEX_WHISPER_ENABLED=true
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      # - EMDEX_WHISPER_MIN_CHARS=50
      # - EMDEX_WHISPER_LANGUAGE=
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      # ── Gemini Vision image captioning (Track 2) ─────────────
      # - EMDEX_VISION_ENABLED=true
      # - EMDEX_VISION_MAX_SIZE_MB=10
      # ── FFmpeg video frame extraction (Track 3) ──────────────
      # - EMDEX_FRAME_ENABLED=true
      # - EMDEX_FFMPEG_URL=http://ffmpeg-sidecar:8004
      # - EMDEX_FRAME_INTERVAL_SEC=30
      # - EMDEX_MAX_FRAMES=10
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMDEX_GRAPH_MIGRATION=${EMDEX_GRAPH_MIGRATION:-auto}
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
      - EMDEX_GATEWAY_URL=http://nginx:80
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
      extractous:
        condition: service_healthy
      whisper:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-sftp:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant-1:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=${SFTP_NAMESPACE:-sftp}
      - NODE_TYPE=sftp
      - SFTP_HOST=${SFTP_HOST}
      - SFTP_USER=${SFTP_USER}
      - SFTP_PASS=${SFTP_PASS}
      - NODE_HEALTH_PORT=8083
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      # ── Audio/Video transcription (Track 1) ──────────────────
      # - EMDEX_WHISPER_ENABLED=true
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      # - EMDEX_WHISPER_MIN_CHARS=50
      # - EMDEX_WHISPER_LANGUAGE=
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      # ── Gemini Vision image captioning (Track 2) ─────────────
      # - EMDEX_VISION_ENABLED=true
      # - EMDEX_VISION_MAX_SIZE_MB=10
      # ── FFmpeg video frame extraction (Track 3) ──────────────
      # - EMDEX_FRAME_ENABLED=true
      # - EMDEX_FFMPEG_URL=http://ffmpeg-sidecar:8004
      # - EMDEX_FRAME_INTERVAL_SEC=30
      # - EMDEX_MAX_FRAMES=10
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMDEX_GRAPH_MIGRATION=${EMDEX_GRAPH_MIGRATION:-auto}
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
      - EMDEX_GATEWAY_URL=http://nginx:80
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
    networks:
      - emdexer-net
    depends_on:
      qdrant-1:
        condition: service_healthy
      extractous:
        condition: service_healthy
      whisper:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MCP server
  # ============================================================

  mcp:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.mcp
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "8002:8002"
    environment:
      - GATEWAY_URL=http://nginx:80
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
    networks:
      - emdexer-net
    depends_on:
      nginx:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: always

networks:
  emdexer-net:
    driver: bridge

volumes:
  qdrant-storage-1:
  qdrant-storage-2:
  qdrant-storage-3:
  postgres-data:
  whisper-models:
