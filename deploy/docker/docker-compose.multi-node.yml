# Multi-Node deployment example (Phase 15.3)
#
# 1 Gateway + 2 indexing nodes with separate namespaces.
# The gateway maintains a node registry (file-backed) and fans out
# global searches across all registered namespaces.
#
# Usage:
#   cp .env.example .env   # fill in GOOGLE_API_KEY and EMDEX_AUTH_KEY
#   docker compose -f deploy/docker/docker-compose.multi-node.yml up -d
#
# After startup:
#   emdex status            # shows 2 nodes, 2 namespaces
#   emdex search --global "your query"

services:
  # ============================================================
  # Qdrant — shared vector store
  # ============================================================

  qdrant:
    image: qdrant/qdrant:v1.17.1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6333 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Extractous sidecar (document text extraction)
  # ============================================================

  plugin-sidecar:
    build: ../../src/plugin-sidecar
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ../../plugins:/plugins:ro
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  extractous:
    build: ./extractous-sidecar
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Gateway — API gateway + node registry + fan-out search
  # ============================================================

  gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    ports:
      - "7700:7700"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    environment:
      - EMDEX_PORT=7700
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-gemini}
      # - OLLAMA_HOST=http://ollama:11434
      # - OLLAMA_EMBED_MODEL=nomic-embed-text:v2
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - OPENAI_EMBED_MODEL=text-embedding-3-small
      - EMDEX_REGISTRY_FILE=/var/lib/emdexer/nodes/nodes.json
      - EMDEX_GLOBAL_SEARCH_TIMEOUT=${EMDEX_GLOBAL_SEARCH_TIMEOUT:-500}
      - EMDEX_SEARCH_LIMIT=${EMDEX_SEARCH_LIMIT:-10}
      - EMDEX_CHAT_LIMIT=${EMDEX_CHAT_LIMIT:-5}
      - EMDEX_API_KEYS=${EMDEX_API_KEYS:-}
      - EMDEX_BM25_ENABLED=${EMDEX_BM25_ENABLED:-true}
      - EMDEX_RRF_K=${EMDEX_RRF_K:-60}
      - EMDEX_RRF_VECTOR_WEIGHT=${EMDEX_RRF_VECTOR_WEIGHT:-1.0}
      - EMDEX_RRF_BM25_WEIGHT=${EMDEX_RRF_BM25_WEIGHT:-1.0}
      - EMDEX_AGENTIC_ENABLED=${EMDEX_AGENTIC_ENABLED:-true}
      - EMDEX_MAX_HOPS=${EMDEX_MAX_HOPS:-3}
      - EMDEX_HOP_CONFIDENCE_THRESHOLD=${EMDEX_HOP_CONFIDENCE_THRESHOLD:-0.7}
      - EMDEX_GRAPH_ENABLED=${EMDEX_GRAPH_ENABLED:-true}
      - EMDEX_GRAPH_DEPTH=${EMDEX_GRAPH_DEPTH:-1}
      # Uncomment to enable distributed tracing (OTLP/gRPC, backend-agnostic).
      # - EMDEX_OTEL_ENDPOINT=otel-collector:4317
      # - EMDEX_OTEL_SAMPLING_RATIO=1.0
      # ── Qdrant mTLS (Phase 28) ────────────────────────────────
      # - EMDEX_QDRANT_TLS=true
      # - EMDEX_QDRANT_TLS_CA=/certs/ca.pem
      # - EMDEX_QDRANT_TLS_CERT=/certs/client.pem
      # - EMDEX_QDRANT_TLS_KEY=/certs/client.key
      # ── PostgreSQL read replica (Phase 28) ───────────────────
      # - EMDEX_PG_REPLICA_URL=postgres://user:pass@replica:5432/emdexer?sslmode=require
    volumes:
      - gateway-registry:/var/lib/emdexer/nodes
    networks:
      - emdexer-net
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Node A — indexes local documents under the "docs" namespace
  # Mount your document directory at /app/data via the volume below.
  # ============================================================

  node-docs:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=docs
      - NODE_TYPE=local
      - NODE_ROOT=/app/data
      - NODE_HEALTH_PORT=8081
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      # ── Audio/Video transcription (Track 1) ──────────────────
      # - EMDEX_WHISPER_ENABLED=true
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      # - EMDEX_WHISPER_MIN_CHARS=50
      # - EMDEX_WHISPER_LANGUAGE=
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      # ── Gemini Vision image captioning (Track 2) ─────────────
      # - EMDEX_VISION_ENABLED=true
      # - EMDEX_VISION_MAX_SIZE_MB=10
      # ── FFmpeg video frame extraction (Track 3) ──────────────
      # - EMDEX_FRAME_ENABLED=true
      # - EMDEX_FFMPEG_URL=http://ffmpeg-sidecar:8004
      # - EMDEX_FRAME_INTERVAL_SEC=30
      # - EMDEX_MAX_FRAMES=10
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-gemini}
      # - OLLAMA_HOST=http://ollama:11434
      # - OLLAMA_EMBED_MODEL=nomic-embed-text:v2
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - OPENAI_EMBED_MODEL=text-embedding-3-small
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_POLL_INTERVAL=${EMDEX_POLL_INTERVAL:-60s}
      - EMDEX_GRAPH_MIGRATION=${EMDEX_GRAPH_MIGRATION:-auto}
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
    volumes:
      # Replace ./docs-data with your actual documents directory
      - ${DOCS_DATA_PATH:-./docs-data}:/app/data:ro
    networks:
      - emdexer-net
    depends_on:
      qdrant:
        condition: service_healthy
      gateway:
        condition: service_healthy
      extractous:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Node B — indexes a second directory under the "code" namespace
  # Mount your source code directory at /app/data via the volume below.
  # ============================================================

  node-code:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=code
      - NODE_TYPE=local
      - NODE_ROOT=/app/data
      - NODE_HEALTH_PORT=8082
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      # ── Audio/Video transcription (Track 1) ──────────────────
      # - EMDEX_WHISPER_ENABLED=true
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      # - EMDEX_WHISPER_MIN_CHARS=50
      # - EMDEX_WHISPER_LANGUAGE=
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      # ── Gemini Vision image captioning (Track 2) ─────────────
      # - EMDEX_VISION_ENABLED=true
      # - EMDEX_VISION_MAX_SIZE_MB=10
      # ── FFmpeg video frame extraction (Track 3) ──────────────
      # - EMDEX_FRAME_ENABLED=true
      # - EMDEX_FFMPEG_URL=http://ffmpeg-sidecar:8004
      # - EMDEX_FRAME_INTERVAL_SEC=30
      # - EMDEX_MAX_FRAMES=10
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-gemini}
      # - OLLAMA_HOST=http://ollama:11434
      # - OLLAMA_EMBED_MODEL=nomic-embed-text:v2
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - OPENAI_EMBED_MODEL=text-embedding-3-small
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_POLL_INTERVAL=${EMDEX_POLL_INTERVAL:-60s}
      - EMDEX_GRAPH_MIGRATION=${EMDEX_GRAPH_MIGRATION:-auto}
      - EMDEX_PLUGIN_ENABLED=${EMDEX_PLUGIN_ENABLED:-true}
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
    volumes:
      # Replace ./code-data with your actual source directory
      - ${CODE_DATA_PATH:-./code-data}:/app/data:ro
    networks:
      - emdexer-net
    depends_on:
      qdrant:
        condition: service_healthy
      gateway:
        condition: service_healthy
      extractous:
        condition: service_healthy
      plugin-sidecar:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emdexer-net:
    driver: bridge

volumes:
  qdrant-storage:
  # Named volume keeps the node registry across gateway restarts
  gateway-registry:
