# NAS Test Nodes — Synology @ 192.168.0.100
# Two NFS nodes: Plex and Proxmox volumes
#
# Usage (from deploy/docker/):
#   docker compose -f docker-compose.nas-nodes.yml up -d
#
# Requires the main stack (gateway, extractous, qdrant) to already be running.

services:

  node-plex:
    image: emdexer-node:latest
    container_name: emdexer-node-plex
    ports:
      - "8091:8091"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=nas/plex
      - NODE_TYPE=nfs
      - NODE_ROOT=/
      - NFS_HOST=192.168.0.100
      - NFS_PATH=/volume1/Plex
      - NODE_HEALTH_PORT=8091
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMDEX_POLL_INTERVAL=${EMDEX_POLL_INTERVAL:-300s}
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/healthz/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5

  node-proxmox:
    image: emdexer-node:latest
    container_name: emdexer-node-proxmox
    ports:
      - "8092:8092"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=nas/proxmox
      - NODE_TYPE=nfs
      - NODE_ROOT=/
      - NFS_HOST=192.168.0.100
      - NFS_PATH=/volume1/Proxmox
      - NODE_HEALTH_PORT=8092
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=${EMDEX_AUTH_KEY}
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      - EMDEX_WHISPER_URL=${EMDEX_WHISPER_URL:-http://whisper:8080}
      - EMDEX_WHISPER_MODEL=${EMDEX_WHISPER_MODEL:-base}
      - EMDEX_ENABLE_OCR=${EMDEX_ENABLE_OCR:-true}
      - EMDEX_EMBEDDING_DIMS=${EMDEX_EMBEDDING_DIMS:-3072}
      - EMDEX_GEMINI_MODEL=${EMDEX_GEMINI_MODEL:-gemini-embedding-2-preview}
      - EMDEX_POLL_INTERVAL=${EMDEX_POLL_INTERVAL:-300s}
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/healthz/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  emdexer-net:
    external: true
    name: docker_emdexer-net
