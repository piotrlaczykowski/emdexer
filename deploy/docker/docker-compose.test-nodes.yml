services:
  plugin-sidecar:
    build: ../../src/plugin-sidecar
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    volumes:
      - ../../plugins:/plugins:ro
    networks:
      - emdexer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-alpha:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "8082:8082"
    volumes:
      - ../../test_dir_alpha:/app/data:ro
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=alpha
      - NODE_TYPE=local
      - NODE_ROOT=/app/data
      - NODE_HEALTH_PORT=8082
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      - EMDEX_WHISPER_URL=http://whisper:8080
      - EMDEX_ENABLE_OCR=true
      - EMDEX_EMBEDDING_DIMS=3072
      - EMDEX_GEMINI_MODEL=models/gemini-embedding-2-preview
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=RandomKey123
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
    networks:
      - emdexer-net
    depends_on:
      plugin-sidecar:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-beta:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "8083:8083"
    volumes:
      - ../../test_dir_beta:/app/data:ro
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=beta
      - NODE_TYPE=local
      - NODE_ROOT=/app/data
      - NODE_HEALTH_PORT=8083
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      - EMDEX_WHISPER_URL=http://whisper:8080
      - EMDEX_ENABLE_OCR=true
      - EMDEX_EMBEDDING_DIMS=3072
      - EMDEX_GEMINI_MODEL=models/gemini-embedding-2-preview
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=RandomKey123
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
    networks:
      - emdexer-net
    depends_on:
      plugin-sidecar:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-s3:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "8084:8084"
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - NODE_TYPE=s3
      - S3_ENDPOINT=play.min.io
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=emdexer-test
      - S3_USE_SSL=true
      - NODE_HEALTH_PORT=8084
      - EMDEX_EXTRACTOUS_URL=http://extractous:8000
      - EMDEX_EMBEDDING_DIMS=3072
      - EMDEX_GEMINI_MODEL=models/gemini-embedding-2-preview
      - EMDEX_GATEWAY_URL=http://gateway:7700
      - EMDEX_GATEWAY_AUTH_KEY=RandomKey123
      - EMDEX_PLUGIN_SIDECAR_URL=http://plugin-sidecar:8003/extract
    networks:
      - emdexer-net
    depends_on:
      plugin-sidecar:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  emdexer-net:
    external: true
    name: docker_emdexer-net
