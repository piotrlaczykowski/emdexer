services:
  qdrant:
    image: qdrant/qdrant:latest
    # No host port mappings — Qdrant is internal only.
    # Access via the emdexer-net Docker network (qdrant:6333/6334).
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - emdexer-net
    restart: always

  extractous:
    build: ./extractous-sidecar
    # No host port mappings — Extractous is internal only.
    # Access via the emdexer-net Docker network (extractous:8000).
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    ports:
      - "7700:7700"
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
    volumes:
      - ../../logs:/opt/emdexer/logs
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.node
    ports:
      - "8081:8081"
    volumes:
      - ../../test_dir:/opt/emdexer/test_dir
    environment:
      - QDRANT_HOST=qdrant:6334
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EMDEX_NAMESPACE=default
      - NODE_HEALTH_PORT=8081
    networks:
      - emdexer-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "8002:8002"
    environment:
      - GATEWAY_URL=http://gateway:7700
      - EMDEX_AUTH_KEY=${EMDEX_AUTH_KEY}
    networks:
      - emdexer-net
    depends_on:
      gateway:
        condition: service_healthy
    restart: always

networks:
  emdexer-net:
    driver: bridge
