# Nginx configuration for emdexer HA load balancer
# Phase 15.2: Gateway High Availability
#
# Routes all /v1/ traffic across 2 gateway replicas using round-robin.
# Health checks and direct gateway ports are also proxied.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ============================================================
    # Upstream: emdexer gateway replicas
    # ============================================================

    upstream emdexer_gateways {
        # Round-robin by default; add 'least_conn;' for connection-aware LB
        server gateway-1:8080;
        server gateway-2:8080;

        keepalive 32;
    }

    # ============================================================
    # Server block
    # ============================================================

    server {
        listen 80;
        server_name _;

        # Increase timeouts for slow LLM/embedding calls
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ----------------------------------------------------------
        # /v1/ — semantic search & chat completions (load balanced)
        # ----------------------------------------------------------

        location /v1/ {
            proxy_pass http://emdexer_gateways;
        }

        # ----------------------------------------------------------
        # /nodes — node registry endpoints (load balanced)
        # ----------------------------------------------------------

        location = /nodes {
            proxy_pass http://emdexer_gateways;
        }

        location /nodes/ {
            proxy_pass http://emdexer_gateways;
        }

        # ----------------------------------------------------------
        # /health — gateway health (load balanced)
        # ----------------------------------------------------------

        location /health {
            proxy_pass http://emdexer_gateways;
        }

        location /healthz/ {
            proxy_pass http://emdexer_gateways;
        }

        # ----------------------------------------------------------
        # /metrics — Prometheus scrape endpoint (load balanced)
        # ----------------------------------------------------------

        location /metrics {
            proxy_pass http://emdexer_gateways;
        }

        # ----------------------------------------------------------
        # Nginx self status (optional, for debugging)
        # ----------------------------------------------------------

        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
