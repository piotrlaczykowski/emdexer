apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emdexer-gateway.fullname" . }}
  labels:
    {{- include "emdexer-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "emdexer-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "emdexer-gateway.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          env:
            - name: QDRANT_HOST
              value: {{ .Values.config.qdrantHost | quote }}
            - name: QDRANT_COLLECTION
              value: {{ .Values.config.qdrantCollection | quote }}
            - name: Emdexer_AUTH_KEY
              value: {{ .Values.config.authKey | quote }}
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "emdexer-gateway.fullname" . }}-secret
                  key: google-api-key
          livenessProbe:
            httpGet:
              path: /healthz/liveness
              port: http
          readinessProbe:
            httpGet:
              path: /healthz/readiness
              port: http
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
