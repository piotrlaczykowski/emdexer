replicaCount: 1

image:
  repository: laczyk/emdexer-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 7700

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: emdexer.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

config:
  qdrantHost: "qdrant:6334"
  qdrantCollection: "emdexer_v1"
  # authKey: MUST be set — generate with 'emdex init' or openssl rand -hex 32
  authKey: ""

secret:
  googleApiKey: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
