replicaCount: 1

image:
  repository: laczyk/emdexer-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 7700

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: emdexer.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

config:
  qdrantHost: "qdrant:6334"
  qdrantCollection: "emdexer_v1"
  authKey: ""
  # OIDC / JWT (optional — set issuer to enable)
  oidcIssuer: ""
  oidcClientId: ""
  oidcGroupsClaim: "groups"
  # Group-to-namespace ACL (JSON string)
  groupAcl: ""
  # Global search timeout (ms)
  globalSearchTimeout: "500"
  # Hybrid search — BM25 keyword + vector merged via RRF (Phase 21).
  # Set to "false" to fall back to pure vector search.
  bm25Enabled: "true"
  # RRF tuning (Phase 22). Leave empty to use code defaults (K=60, weights=1.0).
  # rrfK: "60"
  # rrfVectorWeight: "1.0"
  # rrfBm25Weight: "1.0"
  # Agentic multi-hop RAG (Phase 20).
  agenticEnabled: "true"
  # maxHops: "3"          # Maximum retrieval hops (1-5). Default: 3.
  # hopConfidenceThreshold: "0.7"  # LLM confidence threshold for early stop. Default: 0.7.
  # Graph-RAG — filesystem knowledge graph (Phase 24).
  # Set graphEnabled to "false" to disable graph expansion.
  graphEnabled: "true"
  # graphDepth: "1"       # BFS hop depth [1-3]. Default: 1.
  # OpenTelemetry distributed tracing (Phase 27). Leave otelEndpoint empty to disable.
  otelEndpoint: ""
  # otelServiceName: "emdex-gateway"
  # otelSamplingRatio: "1.0"
  # HA mode
  haMode: "false"
  postgresUrl: ""
  # PostgreSQL read replica (Phase 28) — routes List queries to replica; fallback to primary on error
  # pgReplicaUrl: "postgres://user:pass@replica:5432/emdexer?sslmode=require"
  # Qdrant mTLS (Phase 28) — default is plaintext gRPC (unchanged)
  qdrantTls: "false"
  # qdrantTlsCa: "/certs/ca.pem"
  # qdrantTlsCert: "/certs/client.pem"
  # qdrantTlsKey: "/certs/client.key"
  # Qdrant HTTP host for cluster health probe (/healthz/qdrant). Defaults to
  # QDRANT_HOST with gRPC port 6334 replaced by HTTP port 6333.
  # qdrantHttpHost: "qdrant:6333"
  # Audit log async buffer size (Phase 29). Default: 1000. Range: [100, 100000].
  # auditBufferSize: "1000"

# Node registry persistence — set enabled=true to keep the registry across pod restarts.
# The registry file path inside the container is persistence.registryFile.
# When disabled, the gateway uses an in-memory registry (lost on restart).
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  registryFile: /var/lib/emdexer/nodes/nodes.json

secret:
  googleApiKey: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
