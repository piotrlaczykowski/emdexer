# Production: manage secrets via External Secrets Operator or HashiCorp Vault
# instead of setting plain-text values in values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "emdexer-node.fullname" . }}-secret
type: Opaque
data:
  google-api-key: {{ .Values.secret.googleApiKey | b64enc | quote }}
  {{- if .Values.secret.openaiApiKey }}
  openai-api-key: {{ .Values.secret.openaiApiKey | b64enc | quote }}
  {{- end }}
