replicaCount: 1

image:
  repository: laczyk/emdexer-node
  pullPolicy: IfNotPresent
  tag: "latest"

config:
  qdrantHost: "qdrant:6334"
  namespace: "default"
  mountPath: "/data"
  extractousHost: "http://extractous:8000"
  # Qdrant mTLS (Phase 28) — default is plaintext gRPC (unchanged)
  qdrantTls: "false"
  # qdrantTlsCa: "/certs/ca.pem"
  # qdrantTlsCert: "/certs/client.pem"
  # qdrantTlsKey: "/certs/client.key"
  # Multi-Modal Hardening (Phase 26)
  # Track 1 — Whisper (audio/video transcription)
  whisperEnabled: "false"
  whisperUrl: "http://whisper:8080"
  whisperModel: "base"
  whisperMinChars: "50"
  whisperLanguage: ""
  enableOcr: "true"
  # Track 2 — Gemini Vision (image captioning)
  visionEnabled: "false"
  visionMaxSizeMB: "10"
  # Track 3 — FFmpeg (video frame extraction)
  frameEnabled: "false"
  ffmpegUrl: ""
  frameIntervalSec: "30"
  maxFrames: "10"
  deltaEnabled: "1"
  fullHash: "0"
  # VFS backend: local | smb | sftp | nfs | s3
  nodeType: "local"
  # Gateway registration (optional)
  gatewayUrl: ""
  gatewayAuthKey: ""
  # Chunking (Phase 31)
  chunkSize: ""    # words per chunk; leave empty to use default (512)
  chunkOverlap: "" # overlapping words; leave empty to use default (50)
  # Contextual Retrieval (Phase 32)
  contextualRetrieval: "false" # set to "true" to prepend LLM context to chunk embeddings
  contextModel: ""             # model for context generation; leave empty to use EMDEX_LLM_MODEL
  # Graph-RAG migration (Phase 24)
  graphMigration: "auto"
  # Extractor plugins (Phase 25)
  pluginEnabled: "true"
  # pluginSidecarUrl: "http://plugin-sidecar:8003/extract"
  pluginDir: "/app/plugins"
  # pluginTimeout: "10s"
  # S3 config (when nodeType=s3)
  s3Endpoint: ""
  s3AccessKey: ""
  s3SecretKey: ""
  s3Bucket: ""
  s3UseSsl: "true"
  s3Prefix: ""

secret:
  googleApiKey: ""

persistence:
  enabled: false
  accessMode: ReadOnlyMany
  size: 10Gi
  storageClass: ""
  existingClaim: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
